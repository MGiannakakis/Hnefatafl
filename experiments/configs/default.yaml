# Default training configuration (Hydra)
# Run: python experiments/run.py (uses this file)
# Override: python experiments/run.py training.side=def obs_mode=perspective

mode: train                # train | cross_play | eval
obs_mode: canonical        # canonical | perspective
variant: tablut

training:
  side: atk                # atk | def
  total_timesteps: 1_000_000
  opponent_update_freq: 50_000
  features_dim: 256
  learning_rate: 3e-4
  n_envs: 8                # parallel envs for rollout collection
  vec_env: subproc         # subproc | dummy (dummy = in-process, for debugging)
  n_steps: 256             # per env; rollout buffer per update = n_steps * n_envs
  batch_size: 512
  n_epochs: 10
  save_dir: null           # defaults to checkpoints/<run_name>
  run_name: null           # auto-generated if null
  use_wandb: false
  verbose: 1
  plot_freq: 10_000        # regenerate diagnostic figures every N timesteps; 0 disables
  dashboard_port: 8787     # localhost port for the live HTML dashboard; 0 disables the server
  checkpoint_freq: 25_000  # save model_<steps>_steps.zip every N timesteps; 0 disables

cross_play:
  source_ckpt: null        # path to trained model; required for cross-play mode
  target_side: def
  total_timesteps: 200_000
  opponent_update_freq: 25_000
  n_envs: 8
  vec_env: subproc
  n_steps: 256             # per env; overrides the checkpoint's saved value
  batch_size: 512
  run_name: null
  use_wandb: false
  checkpoint_freq: 25_000  # save model_<steps>_steps.zip every N timesteps; 0 disables

duel:
  total_timesteps_per_side: 1_000_000   # ADDITIONAL steps per side this run
  steps_per_phase: 10_000  # alternation granularity: short phases curb per-rival overfitting
  features_dim: 256
  learning_rate: 3e-4
  n_envs: 8                # per side; two vec envs exist but only one trains at a time
  vec_env: subproc         # subproc | dummy
  n_steps: 256             # per env; buffer per update = n_steps * n_envs
  batch_size: 512
  n_epochs: 10
  ent_coef: 0.01           # entropy bonus: stochastic policies are harder to exploit
  pool_size: 20            # opponent pool: keep the rival's last N snapshots (1 = latest only)
  pool_p_latest: 0.8       # P(episode opponent = newest snapshot); else uniform over older
  atk_ckpt: null           # optional warm starts; fresh networks when null
  def_ckpt: null
  run_name: null           # defaults to duel_<obs_mode>
  checkpoint_freq: 25_000  # per side; save model_<steps>_steps.zip every N timesteps; 0 disables
  plot_freq: 10_000        # per side; 0 disables diagnostics
  dashboard_port: 8787     # ATK dashboard; DEF serves on dashboard_port + 1; 0 disables
  verbose: 1

eval:
  ckpt: null               # path to trained model; required for eval mode
  side: atk                # atk | def
  opponent_ckpt: null      # optional: checkpoint that plays the OTHER side; random when null
  n_episodes: 200
